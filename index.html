<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Chunumunu</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#ffd6ec);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:1s ease;
}

.night{
    background:radial-gradient(circle at bottom,#050816,#000000);
}

.shake{
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translate(0);}
    25%{transform:translate(-8px,5px);}
    50%{transform:translate(8px,-5px);}
    75%{transform:translate(-4px,4px);}
    100%{transform:translate(0);}
}

.container{position:relative;z-index:2;}

h1{
    color:#e60073;
    font-size:clamp(26px,5vw,42px);
    margin-bottom:25px;
}

.love-text{
    font-size:48px;
    color:#ff4da6;
    animation:pulse 1.2s infinite, glow 2s infinite alternate;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

@keyframes glow{
    from{text-shadow:0 0 20px #ff99cc;}
    to{text-shadow:0 0 60px #ff1a75;}
}

.buttons{
    display:flex;
    justify-content:center;
    gap:25px;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 28px;
    font-size:18px;
    cursor:pointer;
    min-width:110px;
}

.yes-btn{background:#ff4da6;color:white;}
.no-btn{background:#999;color:white;}

.star{
    position:fixed;
    width:2px;height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

.firework{
    position:fixed;
    width:4px;height:4px;
    border-radius:50%;
    pointer-events:none;
    box-shadow:0 0 12px currentColor;
    animation:explode 2s ease-out forwards;
}

@keyframes explode{
    from{transform:translate(0,0);opacity:1;}
    to{transform:translate(var(--x),var(--y));opacity:0;}
}

.rocket{
    position:fixed;
    width:3px;
    height:15px;
    background:white;
    bottom:0;
    animation:launch 1s linear forwards;
}

@keyframes launch{
    to{transform:translateY(-70vh);}
}

.fullscreen-gif{
    position:fixed;
    top:0;left:0;
    width:100vw;height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    opacity:0;
    animation:fadeIn 1s forwards;
}

.fullscreen-gif img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:zoomIn 6s ease-in-out infinite alternate;
}

.fade-out{animation:fadeOut 3s ease forwards;}

@keyframes fadeIn{to{opacity:1;}}
@keyframes fadeOut{from{opacity:1;}to{opacity:0;}}
@keyframes zoomIn{from{transform:scale(1);}to{transform:scale(1.1);}}
</style>
</head>

<body>

<div class="container">
    <h1 id="question">WILL YOU BE MY VALENTINE CHUNUMUNU? ❤️</h1>
    <div class="buttons" id="buttons">
        <button class="yes-btn" id="yesButton">Yes 💕</button>
        <button class="no-btn" id="noButton">No 💔</button>
    </div>
</div>

<audio id="bgMusic" preload="auto">
    <source src="tarataraon_688259e05386394.mp3" type="audio/mp3">
</audio>

<script>
const yesButton=document.getElementById("yesButton");
const noButton=document.getElementById("noButton");
const music=document.getElementById("bgMusic");
const question=document.getElementById("question");
const buttons=document.getElementById("buttons");

let fireworkInterval;
let rocketInterval;

/* Escape */
function moveButton(){
    const maxX=window.innerWidth-120;
    const maxY=window.innerHeight-60;
    noButton.style.position="fixed";
    noButton.style.left=Math.random()*maxX+"px";
    noButton.style.top=Math.random()*maxY+"px";
}

document.addEventListener("mousemove",(e)=>{
    const rect=noButton.getBoundingClientRect();
    const d=Math.hypot(
        e.clientX-(rect.left+rect.width/2),
        e.clientY-(rect.top+rect.height/2)
    );
    if(d<120) moveButton();
});

/* Stars */
function createStars(){
    for(let i=0;i<250;i++){
        const s=document.createElement("div");
        s.classList.add("star");
        s.style.left=Math.random()*100+"vw";
        s.style.top=Math.random()*100+"vh";
        document.body.appendChild(s);
    }
}

/* Explosion types */
function createExplosion(x,y,type){
    const colors=["#ffcc00","#ff004c","#00ccff","#ff8800","#ffffff","#ff00ff"];

    let particles = type === "ring" ? 60 : 120;
    let radius = type === "ring" ? 200 : 300;

    for(let i=0;i<particles;i++){
        const p=document.createElement("div");
        p.classList.add("firework");
        p.style.left=x+"px";
        p.style.top=y+"px";
        p.style.color=colors[Math.floor(Math.random()*colors.length)];
        p.style.background=p.style.color;

        let angle = type==="ring" ? (i/particles)*2*Math.PI : Math.random()*2*Math.PI;
        let distance = radius * (type==="ring"?1:Math.random());

        p.style.setProperty('--x',Math.cos(angle)*distance+'px');
        p.style.setProperty('--y',Math.sin(angle)*distance+'px');

        document.body.appendChild(p);
        setTimeout(()=>p.remove(),2000);
    }

    if(type==="mega"){
        document.body.classList.add("shake");
        setTimeout(()=>document.body.classList.remove("shake"),300);
    }
}

/* Rockets */
function launchRocket(){
    const rocket=document.createElement("div");
    rocket.classList.add("rocket");
    rocket.style.left=Math.random()*100+"vw";
    document.body.appendChild(rocket);

    setTimeout(()=>{
        rocket.remove();
        createExplosion(
            window.innerWidth*Math.random(),
            window.innerHeight*(0.3+Math.random()*0.3),
            ["normal","ring","mega"][Math.floor(Math.random()*3)]
        );
    },1000);
}

/* Continuous fireworks */
function startFireworks(){
    fireworkInterval=setInterval(()=>{
        createExplosion(
            Math.random()*window.innerWidth,
            Math.random()*window.innerHeight*0.6,
            ["normal","ring"][Math.floor(Math.random()*2)]
        );
    },600);

    rocketInterval=setInterval(launchRocket,1200);
}

function stopFireworks(){
    clearInterval(fireworkInterval);
    clearInterval(rocketInterval);
}

/* YES */
yesButton.addEventListener("click",function(){

    music.currentTime=0;
    music.play().catch(()=>{});

    document.body.classList.add("night");
    buttons.classList.add("hidden");

    question.innerHTML="I Love You Chunumunu ❤️";
    question.classList.add("love-text");

    createStars();
    startFireworks();

    const overlay=document.createElement("div");
    overlay.classList.add("fullscreen-gif");
    overlay.innerHTML=`<img src="blow-kiss-cute-baby.gif">`;
    document.body.appendChild(overlay);

    setTimeout(()=>overlay.classList.add("fade-out"),12000);

    setTimeout(()=>{
        overlay.remove();
        stopFireworks();
        location.reload();
    },16000);  // more time for fireworks
});
</script>

</body>
</html>

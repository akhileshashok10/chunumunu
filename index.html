<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Chunumunu</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#ffd6ec);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:0.6s ease;
}

.glow{
    background:radial-gradient(circle,#fff0f6,#ffcce6);
}

.container{
    position:relative;
    z-index:2;
}

h1{
    color:#e60073;
    font-size:clamp(24px,5vw,40px);
    margin-bottom:25px;
}

/* BUTTON CONTAINER FIXED */
.buttons{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    height:120px;
}

/* BUTTON STYLE */
button{
    border:none;
    border-radius:10px;
    padding:12px 28px;
    font-size:18px;
    cursor:pointer;
    transition:all 0.3s ease;
    min-width:110px;
}

.yes-btn{
    background:#ff4da6;
    color:white;
}

/* NO BUTTON STARTS ALIGNED */
.no-btn{
    background:#999;
    color:white;
}

/* FULLSCREEN GIF */
.fullscreen-gif{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    opacity:0;
    animation:fadeIn 1s forwards;
}

.fullscreen-gif img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:zoomIn 6s ease-in-out infinite alternate;
}

.fade-out{
    animation:fadeOut 3s ease forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

@keyframes fadeOut{
    0%{opacity:1;}
    100%{opacity:0;}
}

@keyframes zoomIn{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

/* HEARTS */
.heart{
    position:absolute;
    bottom:-20px;
    font-size:20px;
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-110vh);opacity:0;}
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

/* RING */
.ring{
    font-size:55px;
    animation:pop 1s ease forwards;
}

@keyframes pop{
    0%{transform:scale(0);}
    80%{transform:scale(1.4);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">
    <h1>WILL YOU BE MY VALENTINE CHUNUMUNU? ❤️</h1>

    <div class="buttons">
        <button class="yes-btn" id="yesButton">Yes 💕</button>
        <button class="no-btn" id="noButton">No 💔</button>
    </div>

    <div id="result"></div>
</div>

<audio id="bgMusic" preload="auto">
    <source src="tarataraon_688259e05386394.mp3" type="audio/mp3">
</audio>

<script>
let size=18;
const noButton=document.getElementById("noButton");
const yesButton=document.getElementById("yesButton");
const music=document.getElementById("bgMusic");

/* ESCAPE FUNCTION */
function moveButton(){
    const maxX=window.innerWidth-120;
    const maxY=window.innerHeight-60;

    noButton.style.position="fixed";
    noButton.style.left=Math.random()*maxX+"px";
    noButton.style.top=Math.random()*maxY+"px";
    noButton.style.transition="all 0.4s cubic-bezier(.17,.67,.83,.67)";

    size+=4;
    yesButton.style.fontSize=size+"px";
    yesButton.style.padding=(size/1.8)+"px "+(size*1.4)+"px";
}

/* DISTANCE CHECK */
function handleEscape(x,y){
    const rect=noButton.getBoundingClientRect();
    const distance=Math.hypot(
        x-(rect.left+rect.width/2),
        y-(rect.top+rect.height/2)
    );
    if(distance<120){
        moveButton();
    }
}

/* DESKTOP */
document.addEventListener("mousemove",(e)=>{
    handleEscape(e.clientX,e.clientY);
});

/* MOBILE */
document.addEventListener("touchmove",(e)=>{
    const touch=e.touches[0];
    handleEscape(touch.clientX,touch.clientY);
});

/* PREVENT CLICK */
noButton.addEventListener("click",(e)=>{
    e.preventDefault();
    moveButton();
});

/* YES CLICK */
yesButton.addEventListener("click",function(){

    music.currentTime=0;
    music.play().catch(()=>{});

    document.body.classList.add("glow");

    document.getElementById("result").innerHTML=`
        <div class="ring">💍</div>
        <h2>YAYYYY CHUNUMUNU!!! ❤️😍🎉</h2>
    `;

    launchConfetti();

    const overlay=document.createElement("div");
    overlay.classList.add("fullscreen-gif");
    overlay.innerHTML=`<img src="blow-kiss-cute-baby.gif">`;
    document.body.appendChild(overlay);

    /* 14100ms total */
    setTimeout(()=>{
        overlay.classList.add("fade-out");
    },11100);

    setTimeout(()=>{
        overlay.remove();
    },14100);
});

/* HEARTS */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    heart.style.animationDuration=(Math.random()*3+4)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),7000);
}
setInterval(createHeart,300);

/* CONFETTI */
function launchConfetti(){
    for(let i=0;i<150;i++){
        const confetti=document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left=Math.random()*100+"vw";
        confetti.style.backgroundColor=randomColor();
        confetti.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(confetti);
        setTimeout(()=>confetti.remove(),5000);
    }
}

function randomColor(){
    const colors=["#ff4da6","#ffcc00","#00ccff","#66ff66","#ff6666"];
    return colors[Math.floor(Math.random()*colors.length)];
}
</script>

</body>
</html>

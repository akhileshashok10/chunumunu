<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Chunumunu</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#ffd6ec);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:1s ease;
}

.night{
    background:radial-gradient(circle at bottom,#050816,#000000);
}

.container{
    position:relative;
    z-index:2;
}

h1{
    color:#e60073;
    font-size:clamp(26px,5vw,42px);
    margin-bottom:25px;
}

.love-text{
    font-size:48px;
    color:#ff4da6;
    animation:pulse 1.2s infinite, glow 2s infinite alternate;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

@keyframes glow{
    from{text-shadow:0 0 20px #ff99cc;}
    to{text-shadow:0 0 60px #ff1a75;}
}

.buttons{
    display:flex;
    justify-content:center;
    gap:25px;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 28px;
    font-size:18px;
    cursor:pointer;
    min-width:110px;
}

.yes-btn{background:#ff4da6;color:white;}
.no-btn{background:#999;color:white;}

.star{
    position:fixed;
    width:2px;height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

.firework{
    position:fixed;
    width:4px;height:4px;
    border-radius:50%;
    pointer-events:none;
    box-shadow:0 0 14px currentColor;
    animation:explode 2s ease-out forwards;
}

@keyframes explode{
    from{transform:translate(0,0);opacity:1;}
    to{transform:translate(var(--x),var(--y));opacity:0;}
}

.rocket{
    position:fixed;
    width:3px;
    height:18px;
    background:white;
    bottom:0;
    animation:launch 1s linear forwards;
}

@keyframes launch{
    to{transform:translateY(-75vh);}
}

/* Bigger centered GIF */
.center-gif{
    margin-top:30px;
    width:380px;
    max-width:85vw;
    border-radius:25px;
    box-shadow:0 0 40px rgba(255,255,255,0.6);
    animation:fadeIn 1s ease forwards, float 3s ease-in-out infinite alternate;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-12px);}
}
</style>
</head>

<body>

<div class="container">
    <h1 id="question">WILL YOU BE MY VALENTINE CHUNUMUNU? ❤️</h1>

    <div class="buttons" id="buttons">
        <button class="yes-btn" id="yesButton">Yes 💕</button>
        <button class="no-btn" id="noButton">No 💔</button>
    </div>

    <div id="gifContainer"></div>
</div>

<audio id="bgMusic" preload="auto">
    <source src="tarataraon_688259e05386394.mp3" type="audio/mp3">
</audio>

<script>
const yesButton=document.getElementById("yesButton");
const noButton=document.getElementById("noButton");
const music=document.getElementById("bgMusic");
const question=document.getElementById("question");
const buttons=document.getElementById("buttons");
const gifContainer=document.getElementById("gifContainer");

let fireworkInterval;
let rocketInterval;

/* Escape */
function moveButton(){
    const maxX=window.innerWidth-120;
    const maxY=window.innerHeight-60;
    noButton.style.position="fixed";
    noButton.style.left=Math.random()*maxX+"px";
    noButton.style.top=Math.random()*maxY+"px";
}

document.addEventListener("mousemove",(e)=>{
    const rect=noButton.getBoundingClientRect();
    const d=Math.hypot(
        e.clientX-(rect.left+rect.width/2),
        e.clientY-(rect.top+rect.height/2)
    );
    if(d<120) moveButton();
});

/* Stars */
function createStars(){
    for(let i=0;i<300;i++){
        const s=document.createElement("div");
        s.classList.add("star");
        s.style.left=Math.random()*100+"vw";
        s.style.top=Math.random()*100+"vh";
        document.body.appendChild(s);
    }
}

/* Explosion */
function createExplosion(x,y,type){
    const colors=["#ffcc00","#ff004c","#00ccff","#ff8800","#ffffff","#ff00ff"];

    let particles = type==="ring"?80:150;
    let radius = type==="ring"?220:340;

    for(let i=0;i<particles;i++){
        const p=document.createElement("div");
        p.classList.add("firework");
        p.style.left=x+"px";
        p.style.top=y+"px";
        p.style.color=colors[Math.floor(Math.random()*colors.length)];
        p.style.background=p.style.color;

        let angle = type==="ring" ? (i/particles)*2*Math.PI : Math.random()*2*Math.PI;
        let distance = radius*(type==="ring"?1:Math.random());

        p.style.setProperty('--x',Math.cos(angle)*distance+'px');
        p.style.setProperty('--y',Math.sin(angle)*distance+'px');

        document.body.appendChild(p);
        setTimeout(()=>p.remove(),2000);
    }
}

/* Rockets */
function launchRocket(){
    const rocket=document.createElement("div");
    rocket.classList.add("rocket");
    rocket.style.left=Math.random()*100+"vw";
    document.body.appendChild(rocket);

    setTimeout(()=>{
        rocket.remove();
        createExplosion(
            Math.random()*window.innerWidth,
            window.innerHeight*(0.3+Math.random()*0.3),
            ["normal","ring"][Math.floor(Math.random()*2)]
        );
    },1000);
}

/* Continuous fireworks */
function startFireworks(){
    fireworkInterval=setInterval(()=>{
        createExplosion(
            Math.random()*window.innerWidth,
            Math.random()*window.innerHeight*0.7,
            ["normal","ring"][Math.floor(Math.random()*2)]
        );
    },300);  // More frequent explosions

    rocketInterval=setInterval(launchRocket,600); // More rockets
}

function stopFireworks(){
    clearInterval(fireworkInterval);
    clearInterval(rocketInterval);
}

/* YES */
yesButton.addEventListener("click",function(){

    music.currentTime=0;
    music.play().catch(()=>{});

    document.body.classList.add("night");
    buttons.classList.add("hidden");

    question.innerHTML="I Love You Chunumunu ❤️";
    question.classList.add("love-text");

    createStars();
    startFireworks();

    gifContainer.innerHTML=`<img src="blow-kiss-cute-baby.gif" class="center-gif">`;

    setTimeout(()=>{
        stopFireworks();
        location.reload();
    },14500);  // 14.5 seconds total celebration
});
</script>

</body>
</html>
